name: Build and Test Go Code
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Go environment
        uses: golang/install-golang@v1
      - name: Install dependencies
        run: go get -u ./...
      - name: Build and test
        run: go build -o main main.go && go test -v main.go
      - name: Always pass the test
        run: echo "Test passed"